<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAVEN</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        display: inline-block;
      }
      #app {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
      /* Chat input — absolutely positioned over canvas, hidden by default */
      #chat-input {
        position: fixed;
        display: none;
        z-index: 1000;
        border: 2px solid #7c6af5;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
        font-family: 'Press Start 2P', monospace, sans-serif;
        background: #fff8f0;
        color: #2d2d2d;
        outline: none;
        width: 260px;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="app"></div>
      <input id="chat-input" type="text" placeholder="Say something..." autocomplete="off" maxlength="500" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
